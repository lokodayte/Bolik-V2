<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolik — Handcrafted Bubble Tea at UWC Dilijan</title>
    <meta name="description"
        content="Order handcrafted bubble tea for campus delivery at UWC Dilijan. Customize your drink, choose your toppings, and enjoy.">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --dark: #1A0F06;
            --amber: #C9850A;
            --gold: #E8B84B;
            --cream: #FAF6EE;
            --surface: #FFF8F0;
            --taupe: #9B8B7A;
            --danger: #c0392b;
            --success: #27ae60;
            --info: #2980b9;
            --radius: 20px;
            --shadow: 0 4px 24px rgba(26, 15, 6, .12)
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 600
        }

        button {
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all .2s
        }

        input,
        select,
        textarea {
            font-family: 'DM Sans', sans-serif;
            outline: none;
            border: 2px solid #e0d5c7;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: .95rem;
            transition: border .2s;
            width: 100%;
            background: #fff
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--amber)
        }

        a {
            color: var(--amber);
            text-decoration: none
        }

        .hidden {
            display: none !important
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            box-shadow: 0 2px 16px rgba(0, 0, 0, .3)
        }

        .nav-brand {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px
        }

        .nav-brand span {
            color: var(--amber)
        }

        .nav-links {
            display: flex;
            gap: 4px
        }

        .nav-links button {
            background: transparent;
            color: var(--cream);
            padding: 8px 18px;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 500;
            opacity: .75
        }

        .nav-links button:hover,
        .nav-links button.active {
            opacity: 1;
            background: rgba(201, 133, 10, .15);
            color: var(--gold)
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px
        }

        .nav-user {
            color: var(--taupe);
            font-size: .85rem
        }

        .nav-logout {
            background: rgba(255, 255, 255, .08);
            color: var(--cream);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: .85rem
        }

        .nav-logout:hover {
            background: rgba(255, 255, 255, .15)
        }

        .cart-btn {
            position: relative;
            background: var(--amber);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem
        }

        .cart-btn:hover {
            background: var(--gold);
            transform: scale(1.1)
        }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: #fff;
            font-size: .65rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700
        }

        /* AUTH */
        #auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark) 0%, #2a1a0e 100%);
            padding: 20px
        }

        .auth-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
            animation: scaleIn .4s ease
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px
        }

        .auth-header h1 {
            font-size: 2.4rem;
            color: var(--dark);
            margin-bottom: 4px
        }

        .auth-header h1 span {
            color: var(--amber)
        }

        .auth-header p {
            color: var(--taupe);
            font-size: .9rem
        }

        .auth-toggle {
            display: flex;
            background: var(--cream);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px
        }

        .auth-toggle button {
            flex: 1;
            padding: 12px;
            background: transparent;
            font-weight: 600;
            color: var(--taupe);
            font-size: .9rem
        }

        .auth-toggle button.active {
            background: var(--amber);
            color: #fff;
            border-radius: 12px
        }

        .form-group {
            margin-bottom: 16px
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: .85rem;
            color: var(--dark)
        }

        .form-error {
            color: var(--danger);
            font-size: .8rem;
            margin-top: 4px;
            display: none
        }

        .form-error.show {
            display: block
        }

        .role-select {
            display: flex;
            gap: 8px;
            margin-top: 4px
        }

        .role-opt {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: 2px solid #e0d5c7;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            font-size: .9rem;
            transition: all .2s
        }

        .role-opt:hover {
            border-color: var(--amber)
        }

        .role-opt.active {
            border-color: var(--amber);
            background: rgba(201, 133, 10, .08);
            color: var(--amber)
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--amber);
            color: #fff;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 8px
        }

        .btn-primary:hover {
            background: #b5770a;
            transform: translateY(-1px)
        }

        /* MAIN */
        #app {
            display: none
        }

        main {
            padding: 88px 24px 40px;
            max-width: 1200px;
            margin: 0 auto
        }

        .page-title {
            font-size: 1.8rem;
            margin-bottom: 8px
        }

        .page-subtitle {
            color: var(--taupe);
            margin-bottom: 28px;
            font-size: .95rem
        }

        /* MENU GRID */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px
        }

        .menu-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
            transition: all .3s;
            animation: fadeUp .4s ease both;
            cursor: pointer;
            position: relative;
            overflow: hidden
        }

        .menu-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(26, 15, 6, .18)
        }

        .menu-card .tag {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--amber);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .menu-card .emoji {
            font-size: 3.2rem;
            margin-bottom: 12px;
            display: block
        }

        .menu-card h3 {
            font-size: 1.25rem;
            margin-bottom: 6px
        }

        .menu-card .desc {
            color: var(--taupe);
            font-size: .85rem;
            line-height: 1.5;
            margin-bottom: 16px
        }

        .menu-card .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .menu-card .price {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--amber)
        }

        .btn-add {
            background: var(--dark);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: .85rem
        }

        .btn-add:hover {
            background: #2a1a0e
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26, 15, 6, .6);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn .2s
        }

        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 36px 32px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn .3s ease;
            position: relative
        }

        .modal h2 {
            margin-bottom: 4px
        }

        .modal .modal-sub {
            color: var(--taupe);
            font-size: .85rem;
            margin-bottom: 24px
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            font-size: 1.4rem;
            color: var(--taupe);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .modal-close:hover {
            background: var(--cream)
        }

        .step-label {
            font-weight: 600;
            font-size: .9rem;
            margin-bottom: 12px;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 8px
        }

        .step-label .num {
            background: var(--amber);
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem
        }

        .syrup-grid,
        .topping-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 24px
        }

        .syrup-opt,
        .topping-opt {
            padding: 12px;
            border: 2px solid #e0d5c7;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-size: .85rem;
            font-weight: 500;
            transition: all .2s
        }

        .syrup-opt:hover,
        .topping-opt:hover {
            border-color: var(--amber)
        }

        .syrup-opt.active {
            border-color: var(--amber);
            background: rgba(201, 133, 10, .1);
            color: var(--amber)
        }

        .topping-opt.active {
            border-color: var(--gold);
            background: rgba(232, 184, 75, .1);
            color: var(--dark)
        }

        .qty-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px
        }

        .qty-row label {
            font-weight: 500
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .qty-controls button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--cream);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark);
            border: 2px solid #e0d5c7
        }

        .qty-controls button:hover {
            border-color: var(--amber)
        }

        .qty-controls span {
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 24px;
            text-align: center
        }

        /* CART PANEL */
        #cart-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 400px;
            max-width: 100%;
            height: 100vh;
            background: var(--surface);
            z-index: 300;
            transform: translateX(100%);
            transition: transform .35s ease;
            box-shadow: -4px 0 30px rgba(0, 0, 0, .15);
            display: flex;
            flex-direction: column
        }

        #cart-panel.open {
            transform: translateX(0)
        }

        .cart-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e8ddd0;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .cart-header h2 {
            font-size: 1.3rem
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid #f0e8dc
        }

        .cart-item .ci-emoji {
            font-size: 2rem
        }

        .cart-item .ci-info {
            flex: 1
        }

        .cart-item .ci-name {
            font-weight: 600;
            font-size: .95rem
        }

        .cart-item .ci-detail {
            color: var(--taupe);
            font-size: .8rem;
            margin-top: 2px
        }

        .cart-item .ci-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px
        }

        .cart-item .ci-price {
            font-weight: 700;
            color: var(--amber)
        }

        .cart-item .ci-qty {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .cart-item .ci-qty button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--cream);
            font-size: .9rem;
            border: 1px solid #e0d5c7
        }

        .cart-item .ci-qty button:hover {
            border-color: var(--amber)
        }

        .ci-remove {
            background: transparent;
            color: var(--danger);
            font-size: .8rem;
            font-weight: 500;
            margin-top: 4px
        }

        .cart-footer {
            padding: 20px 24px;
            border-top: 1px solid #e8ddd0;
            background: var(--cream)
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px
        }

        .cart-total .amount {
            color: var(--amber);
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem
        }

        .cart-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--taupe)
        }

        .cart-empty .ce-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block
        }

        /* CHECKOUT */
        .checkout-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            max-width: 600px;
            margin: 0 auto;
            animation: fadeUp .4s ease;
            margin-bottom: 40px
        }

        .checkout-card h2 {
            margin-bottom: 20px
        }

        .order-summary-items {
            margin-bottom: 20px;
            padding: 16px;
            background: var(--cream);
            border-radius: 12px
        }

        .osi {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: .9rem
        }

        .osi .osi-name {
            color: var(--dark)
        }

        .osi .osi-price {
            font-weight: 600;
            color: var(--amber)
        }

        .divider {
            height: 1px;
            background: #e0d5c7;
            margin: 16px 0
        }

        .payment-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px
        }

        .payment-tabs button {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0d5c7;
            border-radius: 12px;
            font-weight: 600;
            background: #fff
        }

        .payment-tabs button.active {
            border-color: var(--amber);
            background: rgba(201, 133, 10, .08);
            color: var(--amber)
        }

        .card-display {
            background: var(--dark);
            color: var(--gold);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 16px;
            font-family: 'DM Sans', monospace;
            font-size: 1.3rem;
            letter-spacing: 3px
        }

        .upload-area {
            border: 2px dashed #d0c4b4;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            position: relative
        }

        .upload-area:hover {
            border-color: var(--amber);
            background: rgba(201, 133, 10, .03)
        }

        .upload-area input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer
        }

        .upload-area .preview {
            max-width: 200px;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 12px
        }

        .cash-amounts {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px
        }

        .cash-amounts button {
            padding: 8px 16px;
            border: 2px solid #e0d5c7;
            border-radius: 10px;
            background: #fff;
            font-weight: 500;
            font-size: .9rem
        }

        .cash-amounts button:hover,
        .cash-amounts button.active {
            border-color: var(--amber);
            color: var(--amber)
        }

        /* ORDER CARDS */
        .orders-grid {
            display: grid;
            gap: 16px
        }

        .order-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            animation: fadeUp .3s ease both
        }

        .order-card .oc-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px
        }

        .order-card .oc-id {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--amber)
        }

        .order-card .oc-time {
            color: var(--taupe);
            font-size: .8rem
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .status-badge.pending {
            background: #fef3cd;
            color: #856404
        }

        .status-badge.preparing {
            background: #d1ecf1;
            color: #0c5460
        }

        .status-badge.ready {
            background: #d4edda;
            color: #155724
        }

        .status-badge.delivered {
            background: #e2e3e5;
            color: #383d41
        }

        .oc-customer {
            font-weight: 600;
            margin-bottom: 4px
        }

        .oc-items {
            font-size: .85rem;
            color: var(--taupe);
            margin-bottom: 8px;
            line-height: 1.6
        }

        .oc-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: .8rem;
            color: var(--taupe);
            margin-bottom: 12px
        }

        .oc-total {
            font-weight: 700;
            color: var(--amber);
            font-size: 1rem;
            margin-bottom: 12px
        }

        .oc-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .oc-actions button {
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: .85rem
        }

        .btn-take {
            background: var(--amber);
            color: #fff
        }

        .btn-take:hover {
            background: #b5770a
        }

        .btn-ready {
            background: var(--info);
            color: #fff
        }

        .btn-ready:hover {
            background: #2471a3
        }

        .btn-deliver {
            background: var(--success);
            color: #fff
        }

        .btn-deliver:hover {
            background: #229954
        }

        .btn-danger {
            background: var(--danger);
            color: #fff
        }

        .btn-danger:hover {
            background: #a93226
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: .8rem;
            border-radius: 8px
        }

        .btn-outline {
            border: 2px solid #e0d5c7;
            background: #fff;
            color: var(--dark)
        }

        .btn-outline:hover {
            border-color: var(--amber)
        }

        /* CONFIRMATION */
        .confirmation {
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
            animation: fadeUp .4s ease
        }

        .confirmation .check {
            width: 80px;
            height: 80px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2.2rem;
            color: #fff;
            animation: pulse .6s ease
        }

        /* ADMIN */
        .admin-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            flex-wrap: wrap
        }

        .admin-tabs button {
            padding: 10px 20px;
            border: 2px solid #e0d5c7;
            border-radius: 12px;
            font-weight: 500;
            font-size: .85rem;
            background: #fff
        }

        .admin-tabs button.active {
            border-color: var(--amber);
            background: rgba(201, 133, 10, .08);
            color: var(--amber)
        }

        .admin-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow)
        }

        .admin-table th {
            background: var(--dark);
            color: var(--gold);
            padding: 14px 16px;
            text-align: left;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .admin-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f0e8dc;

        }

        .admin-table tr:last-child td {
            border: none
        }

        .admin-table tr:hover td {
            background: var(--cream)
        }

        .admin-form {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            max-width: 600px
        }

        .admin-form h3 {
            margin-bottom: 16px
        }

        .admin-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .screenshot-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #e0d5c7
        }

        /* TOAST */
        #toast-container {
            position: fixed;
            top: 76px;
            right: 20px;
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .toast {
            padding: 14px 20px;
            background: var(--dark);
            color: var(--cream);
            border-radius: 12px;
            font-size: .9rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .2);
            animation: slideInR .3s ease;
            max-width: 350px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .toast.success {
            border-left: 4px solid var(--success)
        }

        .toast.error {
            border-left: 4px solid var(--danger)
        }

        .toast.info {
            border-left: 4px solid var(--info)
        }

        /* SECTION HEADER */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px
        }

        .filter-row {
            display: flex;
            gap: 8px;
            align-items: center
        }

        .filter-row input {
            width: auto;
            padding: 8px 14px;
            font-size: .85rem
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--taupe)
        }

        .empty-state .es-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block
        }

        .empty-state p {
            font-size: .95rem
        }

        .tabs-row {
            display: flex;
            gap: 4px;
            margin-bottom: 20px
        }

        .tabs-row button {
            padding: 10px 24px;
            background: transparent;
            border: 2px solid transparent;
            border-radius: 12px;
            font-weight: 500;
            color: var(--taupe)
        }

        .tabs-row button.active {
            border-color: var(--amber);
            color: var(--amber);
            background: rgba(201, 133, 10, .06)
        }

        /* IMAGE MODAL */
        .img-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            z-index: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: pointer
        }

        .img-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(.93)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes slideInR {
            from {
                opacity: 0;
                transform: translateX(40px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.1)
            }
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            nav {
                padding: 0 12px
            }

            .nav-user {
                display: none
            }

            .nav-links button {
                padding: 6px 10px;
                font-size: .8rem
            }

            main {
                padding: 76px 12px 32px;
                padding-bottom: 60px;

            }

            #cart-panel {

            }

            .menu-grid {
                grid-template-columns: 1fr
            }

            .modal {

                margin: 10px;

            }

            .auth-card {
                padding: 32px 24px
            }

            .checkout-card {
                padding: 20px 16px;
                margin-bottom: 60px;
                border-radius: 16px
            }

            .checkout-card h2 {
                font-size: 1.3rem
            }

            .order-summary-items {
                padding: 12px;
                margin-bottom: 16px
            }

            .osi {
                flex-wrap: wrap;
                gap: 4px
            }

            .payment-tabs {
                gap: 6px
            }

            .payment-tabs button {
                padding: 10px 8px;
                font-size: .85rem
            }

            .card-display {
                font-size: 1.05rem;
                letter-spacing: 2px;
                padding: 16px
            }

            .upload-area {

            }

            .admin-table th,
            .admin-table td {

            }

            .syrup-grid,
            .topping-grid {

            }
        }

        @media(max-width:480px) {
            .nav-links {
                gap: 0
            }

            .auth-header h1 {
                font-size: 1.8rem
            }

            .page-title {
                font-size: 1.4rem
            }

            }
        }

</head>

<body>
    <div id="toast-container"></div>

    <div id="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>B<span>o</span>lik</h1>
                <p>Handcrafted with love at UWC Dilijan</p>
            </div>
            <div class="auth-toggle">
                <button id="tab-login" class="active" onclick="showAuthTab('login')">Sign In</button>
                <button id="tab-register" onclick="showAuthTab('register')">Register</button>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group"><label>Email</label><input type="email" id="login-email"
                        placeholder="you@uwcdilijan.am" required>
                    <div class="form-error" id="login-email-err"></div>
                </div>
                <div class="form-group"><label>Password</label><input type="password" id="login-pass"
                        placeholder="Enter your password" required>
                    <div class="form-error" id="login-pass-err"></div>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group"><label>Full Name</label><input type="text" id="reg-name"
                        placeholder="Your full name" required>
                    <div class="form-error" id="reg-name-err"></div>
                </div>
                <div class="form-group"><label>Email</label><input type="email" id="reg-email"
                        placeholder="you@student.uwcdilijan.am" required>
                    <div class="form-error" id="reg-email-err"></div>
                </div>
                <div class="form-group"><label>Password</label><input type="password" id="reg-pass"
                        placeholder="Create a password" required minlength="4">
                    <div class="form-error" id="reg-pass-err"></div>
                </div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="reg-pass2"
                        placeholder="Confirm your password" required>
                    <div class="form-error" id="reg-pass2-err"></div>
                </div>
                <div class="form-group"><label>I am a...</label>
                    <div class="role-select">
                        <div class="role-opt active" onclick="selectRole(this,'customer')">🧋 Customer</div>
                        <div class="role-opt" onclick="selectRole(this,'employee')">👨‍🍳 Staff</div>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
        </div>
    </div>

    <div id="app">
        <nav>
            <div class="nav-brand">B<span>o</span>lik</div>
            <div class="nav-links" id="nav-links"></div>
            <div class="nav-right">
                <span class="nav-user" id="nav-user"></span>
                <button class="cart-btn hidden" id="nav-cart" onclick="toggleCart()">🛒<span class="cart-badge hidden"
                        id="cart-badge">0</span></button>
                <button class="nav-logout" onclick="logout()">Sign Out</button>
            </div>
        </nav>
        <main id="main-content"></main>
    </div>

    <div id="cart-panel">
        <div class="cart-header">
            <h2>Your Cart</h2><button class="modal-close" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer" id="cart-footer"></div>
    </div>
    <div id="cart-overlay" class="hidden" style="position:fixed;inset:0;background:rgba(26,15,6,.4);z-index:250"
        onclick="toggleCart()"></div>

    <div id="modal-overlay" class="modal-overlay hidden"></div>
    <div id="img-modal" class="img-modal hidden" onclick="this.classList.add('hidden')"></div>

    <script>
        // ── DATA ──
        const SYRUPS = ['Classic Milk', 'Taro', 'Brown Sugar', 'Strawberry', 'Matcha', 'Passion Fruit', 'Lychee Rose'];
        const TOPPINGS = [{ name: 'Tapioca Pearls', emoji: '⚫' }, { name: 'Popping Boba', emoji: '🫧' }, { name: 'Coconut Jelly', emoji: '🥥' }, { name: 'Red Bean', emoji: '🫘' }, { name: 'Aloe Vera', emoji: '🌿' }];
        const DEFAULT_PRODUCTS = [
            { id: 1, name: 'Classic Milk Tea', emoji: '🧋', description: 'Rich and creamy traditional milk tea with a smooth, malty finish', price: 1200, tag: 'Popular' },
            { id: 2, name: 'Taro Dream', emoji: '🟣', description: 'Velvety taro with a hint of vanilla and natural sweetness', price: 1500, tag: 'Signature' },
            { id: 3, name: 'Brown Sugar Boba', emoji: '🍯', description: 'Caramelized brown sugar swirled with fresh milk and tiger stripes', price: 1800, tag: 'Best Seller' },
            { id: 4, name: 'Strawberry Bliss', emoji: '🍓', description: 'Fresh strawberry essence blended with cream for a fruity finish', price: 1400, tag: 'Fruity' },
            { id: 5, name: 'Matcha Zen', emoji: '🍵', description: 'Ceremonial-grade Japanese matcha, earthy and impossibly smooth', price: 2000, tag: 'Premium' },
            { id: 6, name: 'Passion Fruit Burst', emoji: '🌺', description: 'Tropical passion fruit with a tangy, refreshing twist', price: 1300, tag: 'Refreshing' },
            { id: 7, name: 'Lychee Rose Garden', emoji: '🌹', description: 'Delicate lychee meets aromatic rose petals in a floral symphony', price: 1700, tag: 'Signature' }
        ];
        const SUPERADMIN_EMAIL = 'b.sargsyan@student.uwcdilijan.am';
        const CARD_NUMBER = '4169 7385 2910 4401';

        // ── FIREBASE ──
        const firebaseConfig = {
            apiKey: "AIzaSyAxem36soBAXOsfGHGgf33O9odr3mM6uy0",
            authDomain: "bolik-v2.firebaseapp.com",
            databaseURL: "https://bolik-v2-default-rtdb.firebaseio.com",
            projectId: "bolik-v2",
            storageBucket: "bolik-v2.firebasestorage.app",
            messagingSenderId: "919070471375",
            appId: "1:919070471375:web:39b5f3f8645fb98a30b3ba"
        };
        firebase.initializeApp(firebaseConfig);
        const _fb = firebase.database();
        const _ref = { users: _fb.ref('bolik_users'), orders: _fb.ref('bolik_orders'), products: _fb.ref('bolik_products') };

        // ── STATE ──
        let cart = [];
        let selectedRole = 'customer';
        let currentUser = null;
        let currentPage = null;
        let _dbUsers = [];
        let _dbOrders = [];
        let _dbProducts = [];
        let _firebaseReady = false;

        // ── HELPERS ──
        const $ = id => document.getElementById(id);
        const ls = (k, v) => { if (v === undefined) return JSON.parse(localStorage.getItem(k) || 'null'); localStorage.setItem(k, JSON.stringify(v)) };
        const fmt = n => '֏' + n.toLocaleString();
        const genId = () => 'BO-' + Math.random().toString(36).substr(2, 4).toUpperCase();
        const fmtDate = d => { const o = new Date(d); return o.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) + ' ' + o.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) };
        const dateKey = d => new Date(d).toISOString().split('T')[0];
        function _fbArr(snap) { const v = snap.val(); if (!v) return []; return Array.isArray(v) ? v.filter(Boolean) : Object.values(v); }

        // ── DATA (Firebase-backed with local cache) ──
        function getUsers() { return _dbUsers; }
        function saveUsers(u) { _dbUsers = [...u]; _ref.users.set(u).catch(e => toast('User DB Error: ' + e.message, 'error')); }
        function getOrders() { return _dbOrders; }
        function saveOrders(o) { _dbOrders = [...o]; _ref.orders.set(o).catch(e => toast('Order DB Error: ' + e.message, 'error')); }
        function getProducts() { return _dbProducts.length ? _dbProducts : [...DEFAULT_PRODUCTS]; }
        function saveProducts(p) { _dbProducts = [...p]; _ref.products.set(p).catch(e => toast('Product DB Error: ' + e.message, 'error')); }

        function initSuperadmin() {
            const idx = _dbUsers.findIndex(x => x && x.email === SUPERADMIN_EMAIL);
            if (idx === -1) {
                _dbUsers.push({ email: SUPERADMIN_EMAIL, password: 'admin123', name: 'Babken Sargsyan', role: 'superadmin' });
                saveUsers(_dbUsers);
            } else {
                let changed = false;
                if (_dbUsers[idx].role !== 'superadmin') { _dbUsers[idx].role = 'superadmin'; changed = true; }
                if (_dbUsers[idx].password !== 'admin123') { _dbUsers[idx].password = 'admin123'; changed = true; }
                if (!(_dbUsers[idx].name)) { _dbUsers[idx].name = 'Babken Sargsyan'; changed = true; }
                if (changed) saveUsers(_dbUsers);
            }
        }

        // ── TOAST ──
        function toast(msg, type = 'info') { const t = document.createElement('div'); t.className = 'toast ' + type; t.innerHTML = (type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ') + ' ' + msg; $('toast-container').appendChild(t); setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(40px)'; setTimeout(() => t.remove(), 300) }, 3500) }

        // ── AUTH ──
        function showAuthTab(tab) { $('login-form').classList.toggle('hidden', tab !== 'login'); $('register-form').classList.toggle('hidden', tab !== 'register'); $('tab-login').classList.toggle('active', tab === 'login'); $('tab-register').classList.toggle('active', tab === 'register'); document.querySelectorAll('.form-error').forEach(e => { e.classList.remove('show'); e.textContent = '' }) }
        function selectRole(el, role) { selectedRole = role; document.querySelectorAll('.role-opt').forEach(e => e.classList.remove('active')); el.classList.add('active') }
        function showErr(id, msg) { const e = $(id); e.textContent = msg; e.classList.add('show') }
        function clearErrs() { document.querySelectorAll('.form-error').forEach(e => { e.classList.remove('show'); e.textContent = '' }) }

        function handleLogin(ev) {
            ev.preventDefault(); clearErrs();
            const email = $('login-email').value.trim().toLowerCase(), pass = $('login-pass').value;
            // Fetch fresh data from Firebase to avoid cache issues
            _ref.users.once('value').then(function (snap) {
                _dbUsers = _fbArr(snap);
                const user = _dbUsers.find(u => u && u.email && u.email.toLowerCase() === email && u.password === pass);
                if (!user) {
                    const exists = _dbUsers.find(u => u && u.email && u.email.toLowerCase() === email);
                    if (exists) showErr('login-pass-err', 'Invalid password. Account exists.');
                    else showErr('login-pass-err', 'Account not found. Please register or check email.');
                    return;
                }
                loginAs(user);
            }).catch(function (error) {
                showErr('login-pass-err', 'Database Error: ' + error.message);
                toast('Login failed: ' + error.message, 'error');
            });
        }

        function handleRegister(ev) {
            ev.preventDefault(); clearErrs();
            const name = $('reg-name').value.trim(), email = $('reg-email').value.trim().toLowerCase(), pass = $('reg-pass').value, pass2 = $('reg-pass2').value;
            if (!name) { showErr('reg-name-err', 'Name is required'); return }
            //if(!validEmail(email)){showErr('reg-email-err','Only @uwcdilijan.am or @student.uwcdilijan.am emails allowed');return}
            if (pass.length < 4) { showErr('reg-pass-err', 'Password must be at least 4 characters'); return }
            if (pass !== pass2) { showErr('reg-pass2-err', 'Passwords do not match'); return }
            let users = getUsers();
            if (users.find(u => u.email === email)) { showErr('reg-email-err', 'An account with this email already exists'); return }
            const role = email === SUPERADMIN_EMAIL ? 'superadmin' : selectedRole;
            users.push({ email, password: pass, name, role }); saveUsers(users);
            loginAs({ email, name, role }); toast('Welcome to Bolik, ' + name.split(' ')[0] + '!', 'success');
        }

        function loginAs(user) { currentUser = user; ls('bolik_session', user); $('auth-page').style.display = 'none'; $('app').style.display = 'block'; $('nav-user').textContent = user.name; cart = []; buildNav(); navigate(user.role === 'customer' ? 'menu' : 'pending') }
        function logout() { currentUser = null; currentPage = null; ls('bolik_session', null); cart = []; $('app').style.display = 'none'; $('auth-page').style.display = 'flex'; $('login-form').reset(); $('register-form').reset(); showAuthTab('login') }

        // ── NAV ──
        function buildNav() {
            const nl = $('nav-links'); nl.innerHTML = ''; const cb = $('nav-cart');
            if (currentUser.role === 'customer') {
                nl.innerHTML = '<button onclick="navigate(\'menu\')" data-nav="menu">Menu</button><button onclick="navigate(\'myorders\')" data-nav="myorders">My Orders</button>';
                cb.classList.remove('hidden'); updateCartBadge();
            } else {
                nl.innerHTML = '<button onclick="navigate(\'pending\')" data-nav="pending">Pending Orders</button><button onclick="navigate(\'emporders\')" data-nav="emporders">My Orders</button>';
                if (currentUser.role === 'superadmin') nl.innerHTML += '<button onclick="navigate(\'admin\')" data-nav="admin">Admin</button>';
                cb.classList.add('hidden');
            }
        }

        function navigate(page) {
            currentPage = page;
            document.querySelectorAll('[data-nav]').forEach(b => b.classList.toggle('active', b.dataset.nav === page));
            const m = $('main-content');
            if (page === 'menu') renderMenu(m);
            else if (page === 'myorders') renderCustomerOrders(m);
            else if (page === 'pending') renderPendingOrders(m);
            else if (page === 'emporders') renderEmpOrders(m);
            else if (page === 'admin') renderAdmin(m);
            else if (page === 'checkout') renderCheckout(m);
            else if (page === 'confirmation') renderConfirmation(m);
            closeCart();
            // Scroll to top on page change (helps mobile)
            window.scrollTo(0, 0);
        }

        // ── LIVE REFRESH (Firebase real-time listeners) ──
        function refreshCurrentPage() {
            if (!currentUser || !currentPage) return;
            const m = $('main-content');
            if (!m) return;
            if (currentPage === 'pending') renderPendingOrders(m);
            else if (currentPage === 'emporders') renderEmpOrders(m);
            else if (currentPage === 'myorders') renderCustomerOrders(m);
            else if (currentPage === 'admin') renderAdmin(m);
            else if (currentPage === 'menu') renderMenu(m);
        }

        function setupFirebaseListeners() {
            _ref.users.on('value', function (snap) {
                _dbUsers = _fbArr(snap);
            }, err => console.warn('Users listener:', err.message));

            _ref.orders.on('value', function (snap) {
                _dbOrders = _fbArr(snap);
                if (_firebaseReady) refreshCurrentPage();
            }, err => toast('Live updates blocked: ' + err.message, 'error'));

            _ref.products.on('value', function (snap) {
                _dbProducts = _fbArr(snap);
                if (_firebaseReady) refreshCurrentPage();
            }, err => console.warn('Products listener:', err.message));
        }

        // ── MENU ──
        function renderMenu(m) {
            const products = getProducts();
            m.innerHTML = '<h1 class="page-title">Our Menu</h1><p class="page-subtitle">Handcrafted bubble teas made fresh for you — choose your flavor, pick your toppings, and we\'ll deliver to your door.</p><div class="menu-grid" id="menu-grid"></div>';
            const g = $('menu-grid');
            if (!products.length) { g.innerHTML = '<div class="empty-state"><span class="es-icon">🧋</span><p>No drinks available at the moment. Check back soon!</p></div>'; return }
            products.forEach((p, i) => {
                const c = document.createElement('div'); c.className = 'menu-card'; c.style.animationDelay = i * .06 + 's';
                c.innerHTML = `<span class="tag">${p.tag}</span><span class="emoji">${p.emoji}</span><h3>${p.name}</h3><p class="desc">${p.description}</p><div class="card-footer"><span class="price">${fmt(p.price)}</span><button class="btn-add" onclick="event.stopPropagation();openCustomize(${p.id})">Customize & Add</button></div>`;
                c.onclick = () => openCustomize(p.id); g.appendChild(c);
            });
        }

        // ── CUSTOMIZE MODAL ──
        function openCustomize(pid) {
            const p = getProducts().find(x => x.id === pid); if (!p) return;
            const ov = $('modal-overlay'); ov.classList.remove('hidden');
            let selSyrup = SYRUPS.find(s => p.name.toLowerCase().includes(s.toLowerCase().split(' ')[0])) || SYRUPS[0];
            let selToppings = []; let qty = 1;
            function render() {
                ov.innerHTML = `<div class="modal"><button class="modal-close" onclick="document.getElementById('modal-overlay').classList.add('hidden')">✕</button>
<span style="font-size:2.5rem">${p.emoji}</span><h2 style="margin-top:8px">${p.name}</h2><p class="modal-sub">${fmt(p.price)} per drink</p>
<div class="step-label"><span class="num">1</span>Choose Your Syrup</div>
<div class="syrup-grid">${SYRUPS.map(s => `<div class="syrup-opt${s === selSyrup ? ' active' : ''}" onclick="window._cSyrup('${s}')">${s}</div>`).join('')}</div>
<div class="step-label"><span class="num">2</span>Choose Your Toppings</div>
<div class="topping-grid">${TOPPINGS.map(t => `<div class="topping-opt${selToppings.includes(t.name) ? ' active' : ''}" onclick="window._cTop('${t.name}')">${t.emoji} ${t.name}</div>`).join('')}</div>
<div class="qty-row"><label>Quantity</label><div class="qty-controls"><button onclick="window._cQty(-1)">−</button><span>${qty}</span><button onclick="window._cQty(1)">+</button></div></div>
<button class="btn-primary" onclick="window._cAdd()">Add to Cart — ${fmt(p.price * qty)}</button></div>`;
            }
            window._cSyrup = s => { selSyrup = s; render() };
            window._cTop = t => { const i = selToppings.indexOf(t); i >= 0 ? selToppings.splice(i, 1) : selToppings.push(t); render() };

                    initSuperadmin();
                    if (!_dbProducts.length) saveProducts([...DEFAULT_PRODUCTS]);

                    _firebaseReady = true;

                    // Restore session
                    $('auth-page').querySelector('.auth-header').innerHTML = '<div class="brand-emoji">🧋</div><h1>B<span>o</span>lik</h1><p>Handcrafted bubble tea, delivered to your door</p>';
                    const session = ls('bolik_session');
                    if (session) {
                        const u = _dbUsers.find(x => x.email === session.email);
                        if (u) { loginAs(u); return; }
                    }
                    $('auth-page').style.display = 'flex';
                }).catch(err => {
                    console.error('Firebase init error:', err);
                    $('auth-page').querySelector('.auth-header').innerHTML = '<div class="brand-emoji">🧋</div><h1>B<span>o</span>lik</h1><p style="color:#e74c3c">Connection failed: ' + err.message + '</p>';
                });
            }, 100);
            // Only run once
            setTimeout(() => clearInterval(_loadCheck), 500);
        });

    </script>
</body>

</html>
